name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # -------------------------------------------------------
      # Entra ID App Registration で Blob Storage から画像を取得
      # ClientSecretCredential（App Registration）でプライベートコンテナにアクセス
      # -------------------------------------------------------
      - name: Download images from Azure Blob Storage (App Registration auth)
        run: node scripts/download-blob-images.mjs
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
          AZURE_STORAGE_CONTAINER_NAME: ${{ secrets.AZURE_STORAGE_CONTAINER_NAME }}

      # prebuild の二重実行を SKIP_BLOB_DOWNLOAD で防止
      - name: Build Next.js
        run: |
          # ads.txt を生成（NEXT_PUBLIC_ADSENSE_CLIENT_ID が設定されている場合のみ）
          # public/ 以下に置くと Next.js ビルドで out/ へコピーされる
          if [ -n "$NEXT_PUBLIC_ADSENSE_CLIENT_ID" ]; then
            echo "google.com, $NEXT_PUBLIC_ADSENSE_CLIENT_ID, DIRECT, f08c47fec0942fa0" > public/ads.txt
            echo "[build] ads.txt を生成しました"
          fi
          npm run build
        env:
          SKIP_BLOB_DOWNLOAD: "true"
          # NEXT_PUBLIC_* はビルド時に静的 HTML へ焼き込まれる
          # GitHub Secrets に NEXT_PUBLIC_ADSENSE_CLIENT_ID = ca-pub-XXXX を追加すること
          NEXT_PUBLIC_ADSENSE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_ADSENSE_CLIENT_ID }}

      # app_location を "out" に直接指定して skip_app_build でアップロード
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "out"
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
